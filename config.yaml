# Dataset configuration
dataset:
  path: "cnn_dailymail"
  version: "3.0.0"
  subset_size: 20
  split: "test"

# Model Selection
models:
  challenger:
    name: "mistralai/Mistral-Nemo-Instruct-2407" # Best open-weights summarizer for its size
    type: "huggingface"
    device: "cpu"
  baseline:
    name: "meta-llama/Llama-3.2-3B-Instruct" # Significant jump in quality over the 1B version
    type: "huggingface"
    device: "cpu"

# Hyperparameters
generation_params:
  temperature: 0.3
  max_new_tokens: 256
  top_p: 0.9
  repetition_penalty: 1.1
  
# Prompt
prompts:
  # This follows the Llama-3 specific special token format
  llama_summary: |
    <|begin_of_text|><|start_header_id|>system<|end_header_id|>
    You are a professional news editor. Summarize the following article in 3 bullet points.
    <|eot_id|><|start_header_id|>user<|end_header_id|>
    
    Article: {article_text}
    
    Summary:<|eot_id|><|start_header_id|>assistant<|end_header_id|>
  
  nemo_summary: |
    Summarize the following article in 3 bullet points.

    Article: {article_text}

  system_message: 
    "You are a professional news editor. Summarize the following article in exactly 3 concise bullet points. Each bullet must start with '•'. Output only the bullet points, nothing else."
  
  critical_audit: >
    Analyze the following article for potential bias.
    Summarize the main events and highlight any emotionally loaded language.

    Article: {article_text}

    Analysis:

# Metrics
evaluation:
  metrics: ["rouge", "bertscore"]
  bertscore_model: "roberta-large"
  