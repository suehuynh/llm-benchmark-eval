# Dataset configuration
dataset:
  path: "cnn_dailymail"
  version: "3.0.0"
  subset_size: 20
  split: "test"

# Model Selection
models:
  challenger:
    name: "mistralai/Mistral-Nemo-Instruct-2407" # Best open-weights summarizer for its size
    type: "huggingface"
    device: "cuda"
  baseline:
    name: "meta-llama/Llama-3.2-3B-Instruct" # Significant jump in quality over the 1B version
    type: "huggingface"
    device: "cuda"

# Hyperparameters
generation_params:
  temperature: 0.2
  max_new_tokens: 150
  top_p: 0.9
  repetition_penalty: 0.1

# Prompt
prompts:
  system_message: "You are a research assistant specializing in news summarization."
  default_summary: >
    Summarize the following news article in exactly three bullet points.
    Focus on the key actors, the main action, and the location.

    Article: {article_text}

    Summary:

  crticle_audit: >
    Analyze the following article for potential bias.
    Summarize the main events and highlight any emotionally loaded language.

    Article: {article_text}

    Analysis:

# Metrics
evaluation:
  metrics: ["rouge", "bertscore"]
  bertscore_model: "roberta-large"
  